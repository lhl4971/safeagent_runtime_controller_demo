version: '3.8'

services:
  vibe-shell-playground:
    image: vibeshell-mcp
    container_name: vibe_shell
    restart: always
    ports:
      - "22335:22"      # SSH
      - "22336:8000"    # MCP / App
    tty: true
    stdin_open: true
    environment:
      - TZ=Europe/Moscow
      - VIBESHELL_WORKSPACE=/home/ubuntu/workspace
    volumes:
      - ./mcp/vibe_shell.py:/input/vibe_shell.py:ro
      - ./vibe_shell.log:/home/ubuntu/mcp/vibe_shell.log
      - ./live/workspace:/home/ubuntu/workspace